<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variavel</title>
</head>

<body>
    <h1>Exemplo Var + Console</h1><!-- Titulo  -->
    <script> /* JavaScript Inline */
        var idade = window.prompt('Digite a sua idade: '); /* Window.prompt serve para interagir com usuario */
        window.alert(`Idade digitada é: ${idade}`)/* Mostrar  o resultado no console aperte f12 ou CTRL + J para ver */
    </script>
</body>

</html>
