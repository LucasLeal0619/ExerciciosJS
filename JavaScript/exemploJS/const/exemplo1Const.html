<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo Const</title>
</head>

<body>
    <h1>Exemplo Const</h1>
    <p>O nome do sistema é fixo (const)</p>
            <label for="">Digite seu nome:</label>
            <input type="text" id="nome">

            <button onclick="mostrar()">Mostrar</button>

            <p id="resultado"></p>
    <script>
        const sistema = "Sistema Escolar"; /* Constante que não altera */
        function mostrar() { /* função do botão */
            let nome = document.getElementById('nome').value /* Valor digitado ele pode mudar */

            document.getElementById('resultado').innerHTML = `Bem-vindo ${nome} ao ${sistema}` /* Mostrando na tela */



        }
    </script>

</body>

</html>
