<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma de dois numeros</title>
    <link rel="stylesheet" href="./css/Atividade16.css">
</head>

<body>
    <div>
        <h2>Soma de dois numeros</h2>
        <form action="#">
            <label for="">Digite o primeiro numero</label>
            <input type="number" id="num1">

            <label for="">Digite o segundo numero</label>
            <input type="number" id="num2">

            <button onclick="soma()">somar</button>

            <p id="resultado"></p>
        </form>
    </div>
    <script>
        function soma() {
            let num1 = Number(document.getElementById('num1').value)
            let num2 = Number(document.getElementById('num2').value)

            let total = num1 + num2


            document.getElementById('resultado').innerHTML = `O resultado da soma é ${total} `

        }

    </script>

</body>

</html>
