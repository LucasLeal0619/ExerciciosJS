<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="./css/Atividade12.css">
    <script src="./js/Atividade12.js" defer></script>
</head>

<body>
    <div>
      <h1>Formulário de Contato</h1>
        <form action="#">
            <label for="Nome">Nome</label>
            <input type="text" required placeholder="Digite o seu nome">

            <label for="Email">Email</label>
            <input type="email" required placeholder="Digite o seu email">

            <label for="Senha">Senha</label>
            <input type="password" maxlength="20" required placeholder="Digite a sua senha">

            <button onclick="mensagem()">Clique aqui</button>
        </form>
    </div>


</body>

</html>
